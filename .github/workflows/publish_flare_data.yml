# Place this file at: .github/workflows/publish_flare_data.yml (in the ISRO repo)
#
# Runs backend/jobs/publish_to_space_weather.py on a schedule and pushes one
# row + a flux chart to the Space_Weather site's Supabase project.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   SPACE_WEATHER_SUPABASE_URL           — Space_Weather's Supabase project URL
#   SPACE_WEATHER_SUPABASE_SERVICE_KEY   — its service_role/secret key (never
#                                           the anon/publishable key, never
#                                           committed to the repo)
#
# NOTE: this does NOT need this repo's own DATABASE_URL / Postgres — the
# services.cron_data get_*() functions fall back to a live NOAA fetch with no
# local cron cache, which is always the case on a fresh runner.

name: Publish flare data to Space Weather

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes; adjust as needed
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          # --upgrade matters here: requirements.txt may already pin an older
          # supabase-py that predates support for the new sb_secret_/
          # sb_publishable_-prefixed key format (it client-side validates keys
          # as JWTs only and rejects anything else as "Invalid API key",
          # before ever making a network call). A bare `pip install supabase`
          # leaves an already-satisfied pinned version alone.
          pip install --upgrade supabase matplotlib

      # TEMPORARY — remove once the "Invalid API key" issue is confirmed
      # fixed. Prints only lengths/prefixes, never the actual secret values.
      - name: Debug secret shape (safe — no values printed)
        env:
          SPACE_WEATHER_SUPABASE_URL: ${{ secrets.SPACE_WEATHER_SUPABASE_URL }}
          SPACE_WEATHER_SUPABASE_SERVICE_KEY: ${{ secrets.SPACE_WEATHER_SUPABASE_SERVICE_KEY }}
        run: |
          python -c "
          import os
          url = os.environ.get('SPACE_WEATHER_SUPABASE_URL', '')
          key = os.environ.get('SPACE_WEATHER_SUPABASE_SERVICE_KEY', '')
          print('URL length:', len(url), '| starts with https://:', url.startswith('https://'), '| ends with .co:', url.rstrip().endswith('.co'), '| has whitespace:', url != url.strip())
          print('KEY length:', len(key), '| has whitespace:', key != key.strip(), '| prefix:', key[:8], '| looks like JWT (eyJ...):', key.startswith('eyJ'), '| looks like new secret format (sb_secret_...):', key.startswith('sb_secret_'))
          "

      - name: Publish flare data
        env:
          SPACE_WEATHER_SUPABASE_URL: ${{ secrets.SPACE_WEATHER_SUPABASE_URL }}
          SPACE_WEATHER_SUPABASE_SERVICE_KEY: ${{ secrets.SPACE_WEATHER_SUPABASE_SERVICE_KEY }}
          # `python jobs/publish_to_space_weather.py` puts jobs/ on sys.path,
          # not backend/ itself — services/ lives directly under backend/, so
          # PYTHONPATH=. (cwd = backend, via working-directory above) is
          # needed for `from services.cron_data import ...` to resolve.
          PYTHONPATH: .
        run: python jobs/publish_to_space_weather.py